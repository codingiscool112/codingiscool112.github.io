<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Circuit | v2.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>STUDY CIRCUIT <span class="blink">_</span></h1>
            <p id="live-date" class="neon-blue"></p>
        </header>

        <!-- PERFORMANCE TRACKER -->
        <section class="card">
            <h2 class="neon-purple">📈 PERFORMANCE METRICS</h2>
            <p id="stats-text">Analyzing latest match...</p>
            <div class="progress-bg">
                <div class="progress-fill" id="tennis-bar"></div>
            </div>
        </section>

        <!-- DEADLINES -->
        <section class="card">
            <h2 class="neon-blue">📅 CIRCUIT DEADLINES</h2>
            <p id="math-timer" class="pulse">-- Days until Math Quiz</p>
            <p id="jmun-timer">-- Days until JMUN Legal Committee</p>
        </section>

        <!-- INTERACTIVE QUIZ -->
        <section class="card">
            <h2 class="neon-green">🧠 LOGIC CIRCUIT</h2>
            <div id="quiz-area">
                <p id="question">Initializing first challenge...</p>
                <div class="btn-group">
                    <button onclick="handleChoice(true)">TRUE</button>
                    <button onclick="handleChoice(false)">FALSE</button>
                </div>
                <p id="feedback"></p>
            </div>
        </section>

        <!-- SYSTEM STATUS -->
        <section class="card">
            <h2 class="neon-green">🛠️ SYSTEM STATUS</h2>
            <div class="status-grid">
                <p>TIKTOK: <span class="danger">OFFLINE</span></p>
                <p>FOCUS: <span class="success">HIGH</span></p>
                <p>STREAK: <span class="success">DAY 3</span></p>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
