<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Circuit | V1.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>STUDY CIRCUIT <span class="blink">_</span></h1>
            <p id="date-display"></p>
        </header>

        <!-- DASHBOARD SECTION -->
        <section class="card">
            <h2 class="neon-blue">📅 DEADLINE TRACKER</h2>
            <div class="timer-box">
                <p id="math-timer">Loading countdown...</p>
                <p id="jmun-timer">Loading countdown...</p>
            </div>
        </section>

        <!-- QUIZ SECTION -->
        <section class="card">
            <h2 class="neon-green">🧠 QUIZ CIRCUIT</h2>
            <div id="quiz-box">
                <p id="question">Loading next challenge...</p>
                <div class="btn-group">
                    <button onclick="checkAnswer(true)">TRUE</button>
                    <button onclick="checkAnswer(false)">FALSE</button>
                </div>
                <p id="feedback"></p>
            </div>
        </section>

        <!-- SYSTEM STATUS -->
        <section class="card">
            <h2 class="neon-purple">🛠️ SYSTEM STATUS</h2>
            <ul class="stats">
                <li>TIKTOK: <span class="danger">OFFLINE</span></li>
                <li>TENNIS MODE: <span class="success">ACTIVE (4/7)</span></li>
                <li>FOCUS: <span class="success">OPTIMAL</span></li>
            </ul>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
